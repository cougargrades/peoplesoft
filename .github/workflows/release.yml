# see: https://help.github.com/en/actions/language-and-framework-guides/publishing-nodejs-packages#publishing-packages-to-npm-and-github-packages
name: Release & CI
on:
  push:
  workflow_dispatch:
    inputs:

#npx semantic-release@25

permissions:
  contents: read # for checkout

jobs:
  ci:
    name: Build and test on Node ${{ matrix.node_version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node_version: ['22.x', '24.x']
        os: [ubuntu-latest, windows-latest] # previously [ubuntu-latest, windows-latest, macOS-latest]
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@master
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm -r install
      - name: Run TSC
        run: pnpm run tsc
      - name: Run build
        run: pnpm run build
      - name: Run tests
        run: pnpm run test
  
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for trusted publishing and npm provenance
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
    - name: Install dependencies
      run: pnpm install
    # - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
    #   run: npm audit signatures
    - name: Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx semantic-release@25
