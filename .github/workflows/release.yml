# see: https://help.github.com/en/actions/language-and-framework-guides/publishing-nodejs-packages#publishing-packages-to-npm-and-github-packages
name: Release
on:
  push:
    branches: ['master', 'beta', 'alpha']
  workflow_dispatch:
    inputs:

permissions:
  contents: read # for checkout

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for trusted publishing and npm provenance
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
    - name: Install dependencies
      run: pnpm install
    - name: Run build
      run: pnpm run build
    - name: Run tests
      run: pnpm run test
    # - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
    #   run: npm audit signatures
    - name: Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #run: npx semantic-release@25
      run: npx --package semantic-release --package @semantic-release/exec --package conventional-changelog-conventionalcommits semantic-release
