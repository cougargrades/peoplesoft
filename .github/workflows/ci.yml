# see: https://help.github.com/en/actions/language-and-framework-guides/publishing-nodejs-packages#publishing-packages-to-npm-and-github-packages
name: CI
on:
  push:
  workflow_dispatch:
    inputs:

permissions:
  contents: read # for checkout

jobs:
  ci:
    name: Build and test on Node ${{ matrix.node_version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node_version: ['22.x', '24.x']
        os: [ubuntu-latest, windows-latest] # previously [ubuntu-latest, windows-latest, macOS-latest]
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm -r install
      - name: Run TSC
        run: pnpm run tsc
      - name: Run build
        run: pnpm run build
      - name: Run tests
        run: pnpm run test
  